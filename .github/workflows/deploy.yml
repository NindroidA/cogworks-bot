name: Deploy to Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t cogworks-bot:latest .
          docker save cogworks-bot:latest | gzip > cogworks-bot.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "cogworks-bot.tar.gz"
          target: "/tmp/"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            gunzip -c /tmp/cogworks-bot.tar.gz | docker load
            rm /tmp/cogworks-bot.tar.gz
            cd /opt/docker
            docker-compose stop cogworks 2>/dev/null || true
            docker-compose rm -f cogworks 2>/dev/null || true
            docker-compose up -d cogworks
            docker image prune -f
            docker-compose ps cogworks

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "Waiting for health check..."
            sleep 15
            if docker-compose -f /opt/docker/docker-compose.yml ps cogworks | grep -q "Up"; then
              echo "Deployment successful!"
              docker-compose -f /opt/docker/docker-compose.yml logs --tail=20 cogworks
            else
              echo "Deployment may have failed. Checking logs..."
              docker-compose -f /opt/docker/docker-compose.yml logs --tail=50 cogworks
              exit 1
            fi

  update-badges:
    runs-on: ubuntu-latest
    name: Update LOC Badge
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count TypeScript lines
        id: count
        run: |
          LINES=$(find src -name "*.ts" -exec cat {} + | wc -l | tr -d ' ')
          FORMATTED=$(printf "%'d" "$LINES")
          echo "lines=$FORMATTED" >> "$GITHUB_OUTPUT"

      - name: Update badge JSON
        env:
          LINE_COUNT: ${{ steps.count.outputs.lines }}
        run: |
          cat > .github/badges/loc.json << EOF
          {
            "schemaVersion": 1,
            "label": "lines of code",
            "message": "${LINE_COUNT} lines",
            "color": "7C3AED"
          }
          EOF

      - name: Commit badge update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/loc.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update TypeScript LOC badge [skip ci]"
          git push

  send-changelog:
    runs-on: ubuntu-latest
    name: Discord Changelog
    needs: deploy
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and format changelog
        id: changelog
        run: |
          VERSION=$(grep -oE '## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          VERSION="v${VERSION:-Latest}"

          CHANGELOG=$(awk '
            BEGIN { found=0; in_section=0 }
            /^## \[[0-9]+\.[0-9]+\.[0-9]+\]/ {
              if (found) exit;
              found=1;
              next;
            }
            found && /^### / {
              in_section=1;
              print;
              next;
            }
            found && in_section && /^- / { print; next }
            found && in_section && /^  / { next }
            found && in_section && /\S/ && !/^  / { print }
          ' CHANGELOG.md)

          QUOTES=(
            "Yippee! New working cogs!"
            "Fresh gears, who dis?"
            "My cogs have been oiled!"
            "Beep boop"
            "Another day, another cog in the machine"
            "SPINNY COGS!"
            "Turning the wheels of progress"
            "Let's get spinning!"
            "Squeaky clean ;)"
            "Vibing with better cogs!"
            "Oops, I did it again"
            "Oops All Cogs!"
            "Whoops, you found the secret cog stash!"
            "I stole more cogs from the factory"
            "EXPLOSION OF COGS! (Don't worry, they're all new and shiny)"
            "Another one"
            "Cog go brrrrrrr"
            "Cog in the works?"
          )
          QUOTE="${QUOTES[$((RANDOM % ${#QUOTES[@]}))]}"

          REPO_URL="https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md"
          HEADER="# Cogworks Bot ${VERSION}"
          SUBHEADER="> ${QUOTE}"
          FOOTER="-# [View full changelog](${REPO_URL})"

          MESSAGE=$(printf '%s\n\n%s\n\n%s\n\n%s' "$HEADER" "$SUBHEADER" "$CHANGELOG" "$FOOTER")

          if [ ${#MESSAGE} -gt 1950 ]; then
            TRUNCATED="${MESSAGE:0:1850}"
            TRUNCATED=$(echo "$TRUNCATED" | head -n -1)
            MESSAGE=$(printf '%s\n\n...\n\n%s' "$TRUNCATED" "$FOOTER")
          fi

          {
            echo "version=$VERSION"
            echo "content<<CHANGELOG_EOF"
            echo "$MESSAGE"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.content }}
        run: |
          jq -n --arg content "${CHANGELOG_CONTENT}" '{content: $content, flags: 4}' > payload.json
          curl -H "Content-Type: application/json" \
               -d @payload.json \
               "$DISCORD_WEBHOOK"
