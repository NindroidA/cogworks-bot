name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run /command ...
        2. Click button ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Bot version
      description: Check with /ping or package.json
      placeholder: '3.0.0'
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, server size, etc.
